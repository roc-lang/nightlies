on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

name: Nightly release for new compiler

# Do not add permissions here! Configure them at the job level!
permissions: {}

env:
  ZIG_VERSION: 0.16.0
jobs:
  resolve-roc-ref:
    name: Resolve roc commit and date
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ref.outputs.sha }}
      sha_full: ${{ steps.ref.outputs.sha_full }}
      date: ${{ steps.ref.outputs.date }}
      tag_name_components: ${{ steps.ref.outputs.tag_name_components }}

    steps:
      - name: Checkout roc-lang/roc
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          repository: roc-lang/roc

      - name: Resolve ref and date
        id: ref
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "sha_full=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          DATE=$(date "+%Y-%m-%d")
          echo "date=$DATE" >> $GITHUB_OUTPUT
          YEAR=$(echo $DATE | cut -d- -f1)
          MONTH_NUM=$(echo $DATE | cut -d- -f2)
          DAY=$(echo $DATE | cut -d- -f3)
          case $MONTH_NUM in
            01) MONTH="January" ;;
            02) MONTH="February" ;;
            03) MONTH="March" ;;
            04) MONTH="April" ;;
            05) MONTH="May" ;;
            06) MONTH="June" ;;
            07) MONTH="July" ;;
            08) MONTH="August" ;;
            09) MONTH="September" ;;
            10) MONTH="October" ;;
            11) MONTH="November" ;;
            12) MONTH="December" ;;
          esac
          echo "tag_name_components=$YEAR-$MONTH-$DAY" >> $GITHUB_OUTPUT

  build-and-package:
    name: build and package nightly release
    needs: resolve-roc-ref
    runs-on: ${{ matrix.os }}
    env:
      SHA: ${{ needs.resolve-roc-ref.outputs.sha }}
      DATE: ${{ needs.resolve-roc-ref.outputs.date }}
      TAG_NAME_COMPONENTS: ${{ needs.resolve-roc-ref.outputs.tag_name_components }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            artifact_name: macos_x86_64
          - os: macos-15
            artifact_name: macos_apple_silicon
          - os: ubuntu-22.04
            artifact_name: linux_x86_64
          - os: ubuntu-24.04-arm
            artifact_name: linux_arm64
          - os: windows-2022
            artifact_name: windows_x86_64
          #- os: windows-11-arm
          #  artifact_name: windows_arm64

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout roc-lang/roc
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          repository: roc-lang/roc
          ref: ${{ needs.resolve-roc-ref.outputs.sha_full }}
          path: roc-src

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # ratchet:mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
          use-cache: true

      # temp fix, see https://roc.zulipchat.com/#narrow/channel/395097-compiler-development/topic/CI/near/542085291
      - name: delete llvm-config
        if: startsWith(matrix.os, 'ubuntu') && endsWith(matrix.os, '-arm')
        run: |
          sudo rm /usr/lib/llvm-18/bin/llvm-config

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # ratchet:ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: ${{ matrix.os == 'windows-11-arm' && 'arm64' || 'x64' }}

      - name: Print CPU model (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Get-WmiObject -Class Win32_Processor | Select-Object -ExpandProperty Name

      - name: Print CPU model (macOS)
        if: runner.os == 'macOS'
        run: sysctl -a | grep machdep.cpu.brand_string || true

      - name: Print CPU model (Linux)
        if: runner.os == 'Linux'
        run: lscpu | grep "Model name"

      - name: build release
        uses: ./roc-src/.github/actions/flaky-retry
        with:
          command: 'cd roc-src && zig build build-release'
          error_string_contains: 'EndOfStream|build.zig.zon'
          retry_count: 3

      - name: build file name
        run: echo "RELEASE_FOLDER_NAME=roc_nightly-${{ matrix.artifact_name }}-$DATE-$SHA" >> $GITHUB_ENV

      - name: Package release
        run: |
          mkdir -p ${{ env.RELEASE_FOLDER_NAME }}
          cp ./roc-src/zig-out/bin/roc ${{ env.RELEASE_FOLDER_NAME }}/
          cp ./roc-src/LICENSE ./roc-src/legal_details ${{ env.RELEASE_FOLDER_NAME }}/

      - name: Bundle Darwin sysroot (macOS only)
        if: runner.os == 'macOS'
        run: |
          cp -r ./roc-src/src/cli/darwin ${{ env.RELEASE_FOLDER_NAME }}/

      - name: Compress release (Unix)
        if: runner.os != 'Windows'
        run: tar -czvf "${{ env.RELEASE_FOLDER_NAME }}.tar.gz" ${{ env.RELEASE_FOLDER_NAME }}

      - name: Compress release (Windows)
        if: runner.os == 'Windows'
        run: 7z a -tzip "${{ env.RELEASE_FOLDER_NAME }}.zip" ${{ env.RELEASE_FOLDER_NAME }}

      - name: Calculate archive hash for security purposes (Unix)
        if: runner.os != 'Windows'
        run: sha256sum ${{ env.RELEASE_FOLDER_NAME }}.tar.gz

      - name: Calculate archive hash for security purposes (Windows)
        if: runner.os == 'Windows'
        run: sha256sum ${{ env.RELEASE_FOLDER_NAME }}.zip

      - name: Upload roc nightly archive (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_FOLDER_NAME }}.tar.gz
          path: ${{ env.RELEASE_FOLDER_NAME }}.tar.gz
          retention-days: 4

      - name: Upload roc nightly archive (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_FOLDER_NAME }}.zip
          path: ${{ env.RELEASE_FOLDER_NAME }}.zip
          retention-days: 4

  build-wasm-artifacts:
    name: build playground and roc compiler wasm
    needs: resolve-roc-ref
    runs-on: ubuntu-latest

    steps:
      - name: Checkout roc-lang/roc
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          repository: roc-lang/roc
          ref: ${{ needs.resolve-roc-ref.outputs.sha_full }}
          path: roc-src

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # ratchet:mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
          use-cache: true

      - name: Build playground
        uses: ./roc-src/.github/actions/flaky-retry
        with:
          command: 'cd roc-src && zig build build-playground -Doptimize=ReleaseSmall'
          error_string_contains: 'EndOfStream|build.zig.zon'
          retry_count: 3

      - name: Upload playground.wasm
        uses: actions/upload-artifact@v4
        with:
          name: playground.wasm
          path: roc-src/zig-out/bin/playground.wasm
          retention-days: 4

      - name: Build roc compiler wasm archive
        uses: ./roc-src/.github/actions/flaky-retry
        with:
          command: 'cd roc-src && zig build build-echo-wasm-archive -Doptimize=ReleaseSmall'
          error_string_contains: 'EndOfStream|build.zig.zon'
          retry_count: 3

      - name: Upload echo.wasm.zst
        uses: actions/upload-artifact@v4
        with:
          name: echo.wasm.zst
          path: roc-src/zig-out/lib/echo.wasm.zst
          retention-days: 4

  publish-release:
    name: Publish release to GitHub
    if: github.event_name != 'pull_request'
    needs: [resolve-roc-ref, build-and-package, build-wasm-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SHA: ${{ needs.resolve-roc-ref.outputs.sha }}
      TAG_NAME_COMPONENTS: ${{ needs.resolve-roc-ref.outputs.tag_name_components }}

    steps:
      - name: Checkout nightlies repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # ratchet:actions/download-artifact@v5.0.0
        with:
          path: ./artifacts

      - name: Create Release with gh CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly-${{ env.TAG_NAME_COMPONENTS }}-${{ env.SHA }}"
          BODY="Nightly build of new Roc compiler from roc-lang/roc commit [${{ env.SHA }}](https://github.com/roc-lang/roc/commit/${{ env.SHA }}). Note: we still recommend using the [old compiler release](https://github.com/roc-lang/roc/releases/tag/alpha4-rolling) for now."

          # Create the release (non-draft, non-prerelease)
          gh release create "$TAG" artifacts/**/* \
            --title "$TAG" \
            --notes "$BODY" \
            --latest=true

  test-archives:
    name: Test nightly release archives
    if: github.event_name != 'pull_request'
    needs: [resolve-roc-ref, publish-release]
    runs-on: ${{ matrix.os }}
    env:
      SHA: ${{ needs.resolve-roc-ref.outputs.sha }}
      DATE: ${{ needs.resolve-roc-ref.outputs.date }}
      TAG_NAME_COMPONENTS: ${{ needs.resolve-roc-ref.outputs.tag_name_components }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            artifact_name: macos_x86_64
          - os: macos-15
            artifact_name: macos_apple_silicon
          - os: macos-26-intel
            artifact_name: macos_x86_64
          - os: macos-26
            artifact_name: macos_apple_silicon
          - os: ubuntu-22.04
            artifact_name: linux_x86_64
          - os: ubuntu-24.04
            artifact_name: linux_x86_64
          - os: ubuntu-24.04-arm
            artifact_name: linux_arm64
          - os: windows-2022
            artifact_name: windows_x86_64
          - os: windows-2025
            artifact_name: windows_x86_64
          #- os: windows-11-arm
          #  artifact_name: windows_arm64

    defaults:
      run:
        shell: bash

    permissions:
      contents: read

    steps:
      - name: build file name
        run: echo "RELEASE_FOLDER_NAME=roc_nightly-${{ matrix.artifact_name }}-$DATE-$SHA" >> $GITHUB_ENV

      - name: Download release archive (Unix)
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L -H "Authorization: token $GITHUB_TOKEN" -o "${{ env.RELEASE_FOLDER_NAME }}.tar.gz" \
            "https://github.com/${{ github.repository }}/releases/download/nightly-${{ env.TAG_NAME_COMPONENTS }}-${{ env.SHA }}/${{ env.RELEASE_FOLDER_NAME }}.tar.gz"

      - name: Download release archive (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L -H "Authorization: token $GITHUB_TOKEN" -o "${{ env.RELEASE_FOLDER_NAME }}.zip" \
            "https://github.com/${{ github.repository }}/releases/download/nightly-${{ env.TAG_NAME_COMPONENTS }}-${{ env.SHA }}/${{ env.RELEASE_FOLDER_NAME }}.zip"

      - name: Print CPU model (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Get-WmiObject -Class Win32_Processor | Select-Object -ExpandProperty Name

      - name: Print CPU model (macOS)
        if: runner.os == 'macOS'
        run: sysctl -a | grep machdep.cpu.brand_string || true

      - name: Print CPU model (Linux)
        if: runner.os == 'Linux'
        run: lscpu | grep "Model name"

      - name: Decompress release archive (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -xzf "${{ env.RELEASE_FOLDER_NAME }}.tar.gz"

      - name: Decompress release archive (Windows)
        if: runner.os == 'Windows'
        run: |
          7z x "${{ env.RELEASE_FOLDER_NAME }}.zip"

      - name: Checkout nightlies repo for hello_world_test.roc
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          path: nightlies-repo

      - name: Run hello_world_test.roc (Unix)
        if: runner.os != 'Windows'
        run: |
          ./${{ env.RELEASE_FOLDER_NAME }}/roc nightlies-repo/hello_world_test.roc

      - name: Run hello_world_test.roc (Windows)
        if: runner.os == 'Windows'
        run: |
          ./${{ env.RELEASE_FOLDER_NAME }}/roc nightlies-repo/hello_world_test.roc
